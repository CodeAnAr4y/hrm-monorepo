<div class="dialog-container">
  <div class="dialog-header">
    <h2 class="text-xl font-bold">{{ 'cv.projects.dialogs.deleteTitle' | translate }}</h2>
    <button (click)="close()" class="close-btn">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <mat-dialog-content class="dialog-body">
    <p>{{ 'cv.projects.dialogs.deleteConfirm' | translate }} <b>{{ data.name }}?</b></p>
  </mat-dialog-content>

  <mat-dialog-actions align="end" class="dialog-actions">
    <div class="flex gap-4">
      <lib-button
        [width]="ButtonSize.FULL"
        [variant]="ButtonVariant.OUTLINED"
        [textColor]="ButtonTextColor.SECONDARY"
        (click)="close()">
        {{ 'cv.projects.dialogs.cancel' | translate }}
      </lib-button>
      <lib-button
        [width]="ButtonSize.FULL"
        (click)="confirm()">
        {{ 'cv.projects.dialogs.confirm' | translate }}
      </lib-button>
    </div>
  </mat-dialog-actions>
</div>
