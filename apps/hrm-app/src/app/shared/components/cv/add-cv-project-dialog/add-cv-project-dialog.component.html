<div class="dialog-container" [formGroup]="projectForm">
  <div class="dialog-header">
    <h2>{{ 'cv.projects.dialogs.addTitle' | translate }}</h2>
    <button (click)="close()" type="button">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <mat-dialog-content class="dialog-body">
    <div class="grid grid-cols-2 gap-2">
      <lib-select
        [label]="'cv.projects.form.project' | translate"
        [placeholder]="'cv.projects.form.projectPlaceholder' | translate"
        [options]="projectOptions()"
        formControlName="project"
      ></lib-select>

      <lib-input
        [label]="'cv.projects.form.domain' | translate"
        [placeholder]="'cv.projects.form.domain' | translate"
        formControlName="domain"
      ></lib-input>

      <lib-input
        type="date"
        [label]="'cv.projects.form.startDate' | translate"
        formControlName="startDate"
      ></lib-input>

      <lib-input
        type="date"
        [label]="'cv.projects.form.endDate' | translate"
        formControlName="endDate"
      ></lib-input>

      <div class="col-span-2">
        <lib-text-area
          [label]="'cv.projects.form.description' | translate"
          [placeholder]="'cv.projects.form.description' | translate"
          formControlName="description"
        ></lib-text-area>
      </div>

      <div class="col-span-2">
        <lib-multi-select
          [label]="'cv.projects.form.environment' | translate"
          [placeholder]="'cv.projects.form.environmentPlaceholder' | translate"
          [options]="envOptions()!"
          formControlName="environment"
        ></lib-multi-select>
      </div>

      <div class="col-span-2">
        <lib-input
          [label]="'cv.projects.form.responsibilities' | translate"
          [placeholder]="'cv.projects.form.responsibilitiesPlaceholder' | translate"
          formControlName="responsibilities"
        ></lib-input>
      </div>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end" class="p-4">
    <div class="flex gap-4 w-full justify-end">
      <lib-button
        [variant]="ButtonVariant.OUTLINED"
        [textColor]="ButtonTextColor.SECONDARY"
        (click)="close()">
        {{ 'cv.projects.dialogs.cancel' | translate }}
      </lib-button>
      <lib-button
        (click)="confirm()"
        [disabled]="projectForm.invalid">
        {{ 'cv.projects.dialogs.add' | translate }}
      </lib-button>
    </div>
  </mat-dialog-actions>
</div>
