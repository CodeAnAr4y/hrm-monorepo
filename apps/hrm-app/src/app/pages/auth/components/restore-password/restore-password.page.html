<div class="flex-1 flex flex-col max-w-md justify-center">

  <!-- Title -->
  <div class="text-center mb-10 text-white">
    <h1 class="text-4xl mb-3">Forgot password</h1>
    <p>We will send you an email with further instructions</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-10">

    <div class="flex flex-col gap-4">
      <!-- Email -->
      <lib-input
        formControlName="email"
        placeholder="Email"
        type="email"
      />
    </div>

    <div class="flex flex-col gap-4">
      <div class="flex justify-center text-sm">
        <lib-button
          [variant]=ButtonVariant.CONTAINED
        >
          RESET PASSWORD
        </lib-button>
      </div>

      <div class="text-center pt-2">
        <a [routerLink]="['/auth', 'login']" class="text-textSecondary hover:text-white text-sm cursor-pointer">
          CANCEL
        </a>
      </div>
    </div>
  </form>
</div>
