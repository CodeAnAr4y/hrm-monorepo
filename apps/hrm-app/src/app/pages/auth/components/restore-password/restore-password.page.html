<div class="flex-1 flex flex-col max-w-md justify-center">
  <div class="text-center mb-10 text-[var(--color-text-primary)]">
    <h1 class="text-4xl mb-3 font-bold">Forgot password</h1>
    <p class="text-textSecondary">We will send you an email with further instructions</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-10">

    <div class="flex flex-col gap-4">
      <lib-input
        label="Email"
        formControlName="email"
        placeholder="Email"
        type="email"
      />
    </div>

    <div class="flex flex-col gap-4">
      <div class="flex justify-center text-sm mx-auto">
        <lib-button
          [variant]=ButtonVariant.CONTAINED
        >
          RESET PASSWORD
        </lib-button>
      </div>

      <div class="text-center pt-2">
        <a [routerLink]="['/auth', 'login']" class="text-textSecondary hover:text-primary transition-colors text-sm cursor-pointer">
          CANCEL
        </a>
      </div>
    </div>
  </form>
</div>
