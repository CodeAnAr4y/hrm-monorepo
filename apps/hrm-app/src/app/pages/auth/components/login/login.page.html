<div class="flex-1 px-4 md:p-0">
  <div class="text-center mb-10 text-[var(--color-text-primary)]">
    <h1 class="text-4xl mb-3 font-bold">Welcome back</h1>
    <p class="text-textSecondary">Hello again! Log in to continue</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-10">

    <div class="flex flex-col gap-4">
      <lib-input
        formControlName="email"
        placeholder="Email"
        type="email"
      />

      <lib-input
        formControlName="password"
        placeholder="Password"
        [type]="'password'"
      />
    </div>

    <div class="flex flex-col gap-4">
      <div class="flex justify-center text-sm">
        <lib-button
          [variant]=ButtonVariant.CONTAINED
        >
          LOG IN
        </lib-button>
      </div>

      <div class="text-center pt-2">
        <a [routerLink]="['/restore-password']" class="text-textSecondary hover:text-primary transition-colors text-sm cursor-pointer">
          FORGOT PASSWORD
        </a>
      </div>
    </div>
  </form>
</div>
