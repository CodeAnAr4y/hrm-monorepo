<button
  [disabled]="disabled()"
  class="lib-button"
  [ngClass]="{
    'contained': variant() === ButtonVariant.CONTAINED,
    'outlined': variant() === ButtonVariant.OUTLINED,
    'text': variant() === ButtonVariant.TEXT,
    'size-full-container': width() === ButtonSize.FULL,
    'text-color-secondary': textColor() === ButtonTextColor.SECONDARY,
    'text-color-accent': textColor() === ButtonTextColor.ACCENT
  }"
>
  <ng-content />
</button>
