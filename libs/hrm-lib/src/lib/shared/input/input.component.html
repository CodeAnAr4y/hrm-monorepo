<div class="lib-input">
  <input
    matInput
    class="flex-1 bg-transparent outline-none text-[var(--color-text-primary)] placeholder-textSecondary"
    [type]="inputType()"
    [placeholder]="placeholder()"
    [value]="value()"
    [disabled]="disabled()"
    (input)="handleInput($any($event.target).value)"
    (blur)="handleBlur()"
  />

  @if (type() === 'password') {
    <button
      type="button"
      (click)="toggleVisibility()"
      class="text-textSecondary hover:text-[var(--color-primary)] flex items-center transition-colors"
    >
      <mat-icon>{{ hide() ? 'visibility' : 'visibility_off' }}</mat-icon>
    </button>
  }
</div>
