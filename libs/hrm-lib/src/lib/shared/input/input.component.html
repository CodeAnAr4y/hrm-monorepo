<div class="lib-input">
  <input
    matInput
    class="flex-1 bg-transparent outline-none text-white placeholder-gray-400"
    [type]="inputType()"
    [placeholder]="placeholder()"
    [value]="value()"
    [disabled]="disabled()"
    (input)="handleInput($any($event.target).value)"
    (blur)="handleBlur()"
  />

  @if (type() === 'password') {
    <button
      type="button"
      (click)="toggleVisibility()"
      class="text-gray-400 hover:text-white flex items-center"
    >
      <mat-icon>
        {{ hide() ? 'visibility' : 'visibility_off' }}
      </mat-icon>
    </button>
  }
</div>
