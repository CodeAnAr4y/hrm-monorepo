<mat-form-field appearance="outline" class="w-full">
  <mat-label>{{ label() }}</mat-label>

  @if (type() === 'date') {
    <input
      matInput
      [matDatepicker]="picker"
      [placeholder]="placeholder()"
      [value]="value()"
      [disabled]="disabled()"
      (dateChange)="handleInput($event.value)"
      (blur)="handleBlur()"
    />
  } @else {
    <input
      matInput
      [type]="inputType()"
      [placeholder]="placeholder()"
      [value]="value()"
      [disabled]="disabled()"
      (input)="handleInput($any($event.target).value)"
      (blur)="handleBlur()"
      [autocomplete]="!autocomplete() ? 'one-time-code' : 'on'"
    />
  }

  @if (type() === 'date') {
    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
  }

  @if (type() === 'password') {
    <button
      mat-icon-button
      matSuffix
      type="button"
      (click)="toggleVisibility()"
      class="text-textSecondary"
    >
      <mat-icon>{{ hide() ? 'visibility_off' : 'visibility' }}</mat-icon>
    </button>
  }

  <mat-datepicker #picker></mat-datepicker>
</mat-form-field>
