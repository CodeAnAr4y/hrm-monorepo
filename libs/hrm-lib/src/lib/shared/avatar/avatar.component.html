<div class="profile-container">
  <div class="profile-header">
    <div class="avatar-circle"
         [style.width.px]="size()"
         [style.height.px]="size()"
         [style.fontSize.px]="size() / 2.5">
      @if (src()) {
        <img [src]="src()" [alt]="name()" class="avatar-img" />
      } @else {
        <span class="avatar-placeholder">{{ initial }}</span>
      }
    </div>

    @if (isEditable()) {
      <div class="upload-controls">
        <label class="group upload-label">
          <mat-icon class="upload-icon">upload</mat-icon>
          <span class="upload-text">Upload avatar image</span>
          <input type="file" class="hidden" accept="image/png, image/jpeg, image/gif" (change)="onFileSelected($event)" />
        </label>
        <p class="upload-hint">png, jpg or gif no more than 0.5MB</p>
      </div>
    }
  </div>

  <div class="user-info">
    <h2 class="user-name">{{ name() }}</h2>
    <p class="user-email">{{ email() }}</p>
    @if (metadata()) {
      <p class="user-metadata">{{ metadata() }}</p>
    }
  </div>
</div>
