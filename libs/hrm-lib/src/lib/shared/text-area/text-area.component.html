<mat-form-field appearance="outline" class="w-full">
  <mat-label>{{ label() }}</mat-label>
  <textarea
    matInput
    [placeholder]="placeholder()"
    [value]="value()"
    [disabled]="disabled()"
    [rows]="rows()"
    (input)="handleInput($any($event.target).value)"
    (blur)="handleBlur()"
  ></textarea>
</mat-form-field>
