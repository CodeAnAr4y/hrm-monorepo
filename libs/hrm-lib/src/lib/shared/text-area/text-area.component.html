<mat-form-field appearance="outline" class="w-full">
  <mat-label>{{ label() }}</mat-label>
  <textarea
    matInput
    cdkTextareaAutosize
    cdkAutosizeMinRows="4"
    cdkAutosizeMaxRows="14"
    [placeholder]="placeholder()"
    [value]="value()"
    [disabled]="disabled()"
    (input)="handleInput($any($event.target).value)"
    (blur)="handleBlur()"
  ></textarea>
</mat-form-field>
